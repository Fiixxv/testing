<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="css/cascade.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BESTIARY 2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet" />
</head>
<body>
    <div class="page">

        <!-- Header -->

        <div class="header">

            <p class="header-top">My Practice Website 2.0</p>
            <h1>BESTIARY 2.0</h1>
            <div class="header-line"></div>
            <p class="header-sub">Select a character card to view their status profile</p>

        </div>
        <div class="card-grid">

                <!-- XYRON CARD -->

                <a class="char-card xyron-card" href="#xyron-overlay">
                    <div class="card-body">
                        <span class="card-tier">TIER: S</span>
                        <img class="card-photo" src="PHOTO.png" alt="xyron">
                        <div class="card-fade"></div>
                        <div class="card-info">
                            <div class="card-name">XYRON</div>
                            <div class="card-title">THE GUN DEVIL</div>
                            <div class="card-bars">
                                <div class="cbar-row"><span class="cbar-label">STR</span><div class="cbar-track"><div class="cbar-fill" style="--w:50%"></div></div></div>
                                <div class="cbar-row"><span class="cbar-label">VIT</span><div class="cbar-track"><div class="cbar-fill" style="--w:50%"></div></div></div>
                                <div class="cbar-row"><span class="cbar-label">DEX</span><div class="cbar-track"><div class="cbar-fill" style="--w:50%"></div></div></div>
                                <div class="cbar-row"><span class="cbar-label">INT</span><div class="cbar-track"><div class="cbar-fill" style="--w:50%"></div></div></div>
                                <div class="cbar-row"><span class="cbar-label">WIS</span><div class="cbar-track"><div class="cbar-fill" style="--w:50%"></div></div></div>
                                <div class="cbar-row"><span class="cbar-label">CHA</span><div class="cbar-track"><div class="cbar-fill" style="--w:50%"></div></div></div>
                            </div>
                        </div>
                    </div>
                </a>

                <!-- GOPIO CARD -->

                <a class="char-card gopio-card" href="#gopio-overlay">
                    <div class="card-body">
                        <span class="card-tier">TIER: S</span>
                        <img class="card-photo" src="PHOTO.png" alt="gopio">
                        <div class="card-fade"></div>
                        <div class="card-info">
                            <div class="card-name">GOPIO</div>
                            <div class="card-title">A DUDE</div>
                            <div class="card-bars">
                                <div class="cbar-row"><span class="cbar-label">STR</span><div class="cbar-track"><div class="cbar-fill" style="--w:50%"></div></div></div>
                                <div class="cbar-row"><span class="cbar-label">VIT</span><div class="cbar-track"><div class="cbar-fill" style="--w:50%"></div></div></div>
                                <div class="cbar-row"><span class="cbar-label">DEX</span><div class="cbar-track"><div class="cbar-fill" style="--w:50%"></div></div></div>
                                <div class="cbar-row"><span class="cbar-label">INT</span><div class="cbar-track"><div class="cbar-fill" style="--w:50%"></div></div></div>
                                <div class="cbar-row"><span class="cbar-label">WIS</span><div class="cbar-track"><div class="cbar-fill" style="--w:50%"></div></div></div>
                                <div class="cbar-row"><span class="cbar-label">CHA</span><div class="cbar-track"><div class="cbar-fill" style="--w:50%"></div></div></div>
                            </div>
                        </div>
                    </div>
                </a>

                <!-- YUAN CARD -->

                <a class="char-card yuan-card" href="#yuan-overlay">
                    <div class="card-body">
                        <span class="card-tier">TIER: S</span>
                        <img class="card-photo" src="PHOTO.png" alt="yuan">
                        <div class="card-fade"></div>
                        <div class="card-info">
                            <div class="card-name">YUAN</div>
                            <div class="card-title">CONJURER OF VOID</div>
                            <div class="card-bars">
                                <div class="cbar-row"><span class="cbar-label">STR</span><div class="cbar-track"><div class="cbar-fill" style="--w:50%"></div></div></div>
                                <div class="cbar-row"><span class="cbar-label">VIT</span><div class="cbar-track"><div class="cbar-fill" style="--w:50%"></div></div></div>
                                <div class="cbar-row"><span class="cbar-label">DEX</span><div class="cbar-track"><div class="cbar-fill" style="--w:50%"></div></div></div>
                                <div class="cbar-row"><span class="cbar-label">INT</span><div class="cbar-track"><div class="cbar-fill" style="--w:50%"></div></div></div>
                                <div class="cbar-row"><span class="cbar-label">WIS</span><div class="cbar-track"><div class="cbar-fill" style="--w:50%"></div></div></div>
                                <div class="cbar-row"><span class="cbar-label">CHA</span><div class="cbar-track"><div class="cbar-fill" style="--w:50%"></div></div></div>
                            </div>
                        </div>
                    </div>
                </a>

        </div>
        

    </div>
</body>
</html>
